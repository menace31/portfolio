<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="../images/profil.jpg" />
  <title data-i18n="project_title_img"></title>
  <meta name="description" content="Projet de segmentation d'images utilisant U-Net et MobileNetV2 pour créer des masques binaires de silhouettes de chats et chiens." />
  <link rel="stylesheet" href="../styles.css" />
  <script src="../project-page.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="main-nav">
        <a href="../index.html" class="btn-back">
          <span data-i18n="btn_back"></span>
        </a>
      </nav>
      <div class="controls">
        <button class="lang-btn" data-lang="fr" aria-pressed="false" aria-label="Français">FR</button>
        <button class="lang-btn" data-lang="en" aria-pressed="false" aria-label="English">EN</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">        
      <article class="project-article">
        <header class="project-header">
          <img class="project-hero" src="../images/image_processing.png" alt="Image Segmentation Project" />
          <h1 data-i18n="project_title_img"></h1>
          <div class="project-actions">
            <a href="../report/image_processing.pdf" class="btn" target="_blank" data-i18n="view_report"></a>
            <a href="https://github.com/mdevillet/image-segmentation" class="btn" target="_blank" data-i18n="btn_code"></a>
          </div>
        </header>

        <section class="project-content">
          <!-- Description -->
          <div class="project-section">
            <p data-i18n="project_description_img"></p>
          </div>

          <!-- Technologies -->
          <div class="project-section">
            <h3 data-i18n="project_technologies"></h3>
            <div class="tech-list">
              <span class="tech-tag">Python</span>
              <span class="tech-tag">PyTorch</span>
              <span class="tech-tag">U-Net</span>
              <span class="tech-tag">MobileNetV2</span>
              <span class="tech-tag">ImageNet</span>
              <span class="tech-tag">TorchVision</span>
            </div>
          </div>

          <!-- Objectif -->
          <div class="project-section">
            <h3 data-i18n="img_objective"></h3>
            <p data-i18n="img_objective_text"></p>
          </div>

          <!-- Entraînement -->
          <div class="project-section">
            <h3 data-i18n="img_training_title"></h3>
            <p data-i18n="img_training_hyperparams"></p>
            <ul class="feature-list">
              <li data-i18n="img_training_lr"></li>
              <li data-i18n="img_training_batch"></li>
              <li data-i18n="img_training_epochs"></li>
              <li data-i18n="img_training_loss"></li>
            </ul>
            <p style="margin-top: 12px;" data-i18n="img_training_result"></p>
          </div>

          <!-- Architecture -->
          <div class="project-section">
            <h3 data-i18n="img_architecture_title"></h3>
            <p data-i18n="img_architecture_unet"></p>
            <p style="margin-top: 12px;" data-i18n="img_architecture_reason"></p>
            <ul class="feature-list" style="margin-top: 12px;">
              <li data-i18n="img_architecture_encoder"></li>
              <li data-i18n="img_architecture_decoder"></li>
            </ul>
          </div>

          <!-- Transfer Learning -->
          <div class="project-section">
            <h3 data-i18n="img_pretrain_title"></h3>
            <p data-i18n="img_pretrain_mobilenet"></p>
            <p style="margin-top: 12px;" data-i18n="img_pretrain_reason"></p>
            <p style="margin-top: 12px;" data-i18n="img_pretrain_choice"></p>
          </div>

          <!-- Évaluation Qualitative -->
          <div class="project-section">
            <h3 data-i18n="img_eval_title"></h3>
            <p data-i18n="img_eval_best"></p>
            <p style="margin-top: 12px;" data-i18n="img_eval_worst"></p>
          </div>

          <!-- Évaluation Quantitative -->
          <div class="project-section">
            <h3 data-i18n="img_metrics_title"></h3>
            <ul class="feature-list">
              <li data-i18n="img_metrics_trainloss"></li>
              <li data-i18n="img_metrics_valloss"></li>
              <li data-i18n="img_metrics_dice"></li>
            </ul>
          </div>

          <!-- Conclusion -->
          <div class="project-section">
            <h3>Conclusion</h3>
            <p data-i18n="img_conclusion"></p>
          </div>
        </section>
      </article>
    </div>
  </main>
</body>
</html>
